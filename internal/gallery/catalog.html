<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOBL HTML — examples</title>
<style>
* { box-sizing: border-box; }
:root {
	--border: #e4e4e7;
	--border-secondary: #d4d4d7;
	--background: #ffffff;
	--foreground: #18181b;
	--foreground-secondary: #71717a;
	--foreground-tertiary: #a1a1aa;
	--border-document: #e4e4e7;
	--background-document: #fafafa;
	--background-tertiary: #f4f4f5;
	--accent: #018551;
}

html, body { height: 100%; }
body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #f9f9fa; color: var(--foreground); }

.gallery-header {
	padding: 1.25rem 1.25rem 0;
}
.gallery-search {
	display: block;
	width: min(32rem, 100%);
	margin-left: auto;
	margin-right: auto;
	padding: 0.5rem 0.75rem;
	font: inherit;
	color: inherit;
	border: 1px solid var(--border);
	border-radius: 0.5rem;
	background: var(--background);
	box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.gallery-search::placeholder {
	color: var(--foreground-tertiary);
}
.gallery-search:focus,
.card:focus {
	border-color: var(--accent);
	box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
	outline: none;
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(min(100%, 25rem), 1fr));
	gap: 1.25rem;
	padding: 1.25rem;
	max-width: 100%;
}

.card {
	position: relative;
	width: 100%;
	display: flex;
	flex-direction: column;
	gap: 0.5rem;
	border-radius: 1rem;
	border: 1px solid var(--border);
	padding: 0.5rem;
	background: var(--background);
	overflow: hidden;
	text-decoration: none;
	color: var(--foreground);
}

.card:hover {
	box-shadow: 0 1px 2px rgba(0,0,0,.04);
	border-color: var(--border-secondary);
}

.card[hidden] {
	display: none !important;
}

.card-header {
	display: flex;
	align-items: center;
	gap: 0.75rem;
	min-width: 0;
}

.card-avatar {
	flex-shrink: 0;
	width: 2rem;
	height: 2rem;
	position: relative;
	font-weight: 600;
	font-size: 1.125rem;
	line-height: 1;
	color: var(--foreground-secondary);
	border-radius: 0.5rem;
	display: flex;
	align-items: center;
	justify-content: center;
	border: solid 1px var(--border);
}

.preview {
	display: flex;
	flex-direction: column;
	width: 100%;
	pointer-events: none;
}

.preview-tabs {
	display: none;
	align-items: center;
	justify-content: center;
	border-radius: 0.375rem;
	background: var(--background-tertiary);
	color: var(--foreground);
	font-size: 1rem;
	line-height: 1.5;
	gap: 0.125rem;
	padding: 2px;
	width: auto;
}

.preview-tab {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	width: 100%;
	padding: 0.125rem 0.75rem;
	gap: 0.375rem;
	font: inherit;
	font-weight: 500;
	font-size: 1rem;
	line-height: 1.5;
	white-space: nowrap;
	border: none;
	background: transparent;
	color: inherit;
	border-radius: 0.25rem;
	cursor: pointer;
	transition: box-shadow 0.15s ease, background-color 0.15s ease;
}

.preview-tab:focus-visible {
	outline: none;
	box-shadow:
		0 0 0 2px var(--background),
		0 0 0 4px color-mix(in srgb, var(--accent) 35%, transparent);
}

.preview-tab:disabled {
	opacity: 0.5;
	pointer-events: none;
}

.preview-tab[data-state="active"] {
	background: var(--background);
	box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
}

.preview-viewport {
	position: relative;
	width: 100%;
	aspect-ratio: 1 / 1.414;
	overflow: hidden;
}

.preview iframe {
	width: 200%;
	height: 200%;
	border: 0;
	transform: scale(0.5);
	transform-origin: top left;
	border-radius: 0 0 1rem 1rem;
	pointer-events: none;
	position: absolute;
	top: 0;
	left: 0;
}

.preview[data-active-tab="html"] .preview-viewport iframe.preview-pdf {
	visibility: hidden;
	pointer-events: none;
}

.preview[data-active-tab="pdf"] .preview-viewport iframe.preview-html {
	visibility: hidden;
	pointer-events: none;
}

.preview:target {
	position: fixed;
	inset: 0;
	z-index: 1000;
	width: 100vw;
	height: 100vh;
	aspect-ratio: unset;
	overflow: hidden;
	overscroll-behavior: contain;
	background-color: rgba(80,80,80, .8);
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	padding: 1rem;
	box-sizing: border-box;
	pointer-events: auto;
}

.preview:target .preview-tabs {
	position: absolute;
	right: 16px;
	top: 16px;
	display: flex;
	width: 350px;
}

.preview:target .preview-viewport {
	width: auto;
	height: 100vh;
	aspect-ratio: 1 / 1.414;
}

.preview:target iframe {
	width: 100%;
	height: 100%;
	pointer-events: auto;
	transform: none;
	transform-origin: unset;
	border-radius: 0;
	position: static;
	background-color: white;
}

.preview:target[data-active-tab="html"] .preview-viewport iframe.preview-pdf {
	display: none;
	pointer-events: none;
}

.preview:target[data-active-tab="pdf"] .preview-viewport iframe.preview-html {
	display: none;
	pointer-events: none;
}

</style>
</head>
<body>
<header class="gallery-header">
	<input type="search" id="gallery-search" class="gallery-search" placeholder="Filter by filename…" autocomplete="off" spellcheck="false" autofocus>
</header>
<div class="grid" id="gallery-grid">
{{range $i, $e := .}}
<a class="card" id="{{.Label}}" href="#{{.Label}}-pdf" >
	<div class="card-header">
		<div data-avatar class="card-avatar">
			<img class="card-avatar-img" src="{{.FlagURL}}" alt="" width="16" height="16" loading="lazy" decoding="async">
		</div>
		<div class="card-title">
			{{.Label}}
		</div>
	</div>
	<div class="preview" id="{{.Label}}-pdf" data-active-tab="pdf">
		<div role="tablist" aria-label="Preview format" class="preview-tabs">
			<button type="button" role="tab" class="preview-tab" id="{{.Label}}-tab-pdf" data-tab="pdf" data-state="active" aria-selected="true" aria-controls="{{.Label}}-iframe-pdf">PDF</button>
			<button type="button" role="tab" class="preview-tab" id="{{.Label}}-tab-html" data-tab="html" data-state="inactive" aria-selected="false" aria-controls="{{.Label}}-iframe-html" tabindex="-1">HTML</button>
		</div>
		<div class="preview-viewport">
			<iframe class="preview-pdf" id="{{.Label}}-iframe-pdf" src="{{.PdfHref}}" title="{{.Label}} (PDF)" tabindex="-1" loading="lazy"></iframe>
			<iframe class="preview-html" id="{{.Label}}-iframe-html" src="{{.HtmlHref}}" title="{{.Label}} (HTML)" tabindex="-1" loading="lazy"></iframe>
		</div>
	</div>
</a>
{{end}}
</div>
<script>
	var input = document.getElementById("gallery-search");
	var cards = document.querySelectorAll(".card");
	var previews = document.querySelectorAll(".preview");

	input.addEventListener("input", filter);

	function setPreviewTab(preview, mode) {
		preview.setAttribute("data-active-tab", mode);
		var tabs = preview.querySelectorAll('[role="tab"]');
		var pdfFrame = preview.querySelector("iframe.preview-pdf");
		var htmlFrame = preview.querySelector("iframe.preview-html");
		for (var j = 0; j < tabs.length; j++) {
			var tab = tabs[j];
			var active = tab.getAttribute("data-tab") === mode;
			tab.setAttribute("data-state", active ? "active" : "inactive");
			tab.setAttribute("aria-selected", active ? "true" : "false");
			tab.tabIndex = active ? 0 : -1;
		}
		if (pdfFrame) pdfFrame.setAttribute("aria-hidden", mode === "html" ? "true" : "false");
		if (htmlFrame) htmlFrame.setAttribute("aria-hidden", mode === "pdf" ? "true" : "false");
	}

	previews.forEach(function (preview) {
		var tabs = preview.querySelectorAll('[role="tab"]');
		for (var t = 0; t < tabs.length; t++) {
			tabs[t].addEventListener("click", function (e) {
				e.preventDefault();
				e.stopPropagation();
				setPreviewTab(preview, this.getAttribute("data-tab"));
			});
		}
		setPreviewTab(preview, preview.getAttribute("data-active-tab") || "pdf");
	});

	previews.forEach(preview => {
		preview.addEventListener("click", function (e) {
			// e.stopPropagation(); not working, hacking with setTimeout
			setTimeout(function () {
				window.location.hash = "#";
				history.replaceState(null, "", location.pathname + location.search);
			}, 50);
		});
	});

	function filter() {
		var q = input.value.trim().toLowerCase();
		for (var i = 0; i < cards.length; i++) {
			var id = cards[i].id.toLowerCase();
			cards[i].hidden = !!(q && id.indexOf(q) === -1);
		}
	}

	input.focus();

	document.addEventListener("keydown", function (e) {
		if (e.key !== "Escape") return;
		e.preventDefault();
		window.location.hash = "#";
		history.replaceState(null, "", location.pathname + location.search);
	});

	document.addEventListener('focusin', (e) => {
		if (!e.target.hash || !window.location.hash) return;
		window.location.hash = e.target.hash;
	});


</script>
</body>
</html>
